<!DOCTYPE html>
<html>
<head>
<title>EverGreenTree</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    background-color: #F1F8E9;
    color: #263238;
}

/* Titolo */
#welcome {
    position: absolute;
    left: 38%;
}

#diamante {
    width: 6.5%;      /* larghezza diamante chiuso */
    height: 12%;      /* altezza diamante chiuso */
    background-color: #4CAF50;
    position: absolute;
    left: 2%;
    top: 4%;
    transform: rotate(45deg);
    display: flex;
    justify-content: center;
    align-items: center; /* testo centrato quando chiuso */
    cursor: pointer;
    color: #F1F8E9;
    font-size: x-large;
    transition: all 0.4s ease;
    overflow: hidden;
}

#menu-content {
    display: none;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    width: 90%;
    margin-left: 5%;
}

#diamante.menu-aperto #menu-content {
    display: flex;
}

#menu-title {
    font-weight: bold;
    font-size: 1.2em;
    margin-bottom: 5px;
    text-align: center;
    color: #F1F8E9;
    width: 95%; 
}

#menu-content label {
    margin-top: 5px;
    font-size: 0.9em;
}

#menu-content input {
    width: 100%;
    padding: 5px;
    margin-bottom: 10px;
    box-sizing: border-box; /*include il bordo nel calcolo della larghezza, così non fuoriesce*/
}

#menu-content button {
    padding: 5px 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
}


#mappa {
    background-color: antiquewhite;
    width: 50%;
    height: 40%;
    position: absolute;
    top: 30%;
    left: 30%;
}
</style>
</head>
<body>

<h1 id="welcome">Welcome to EverGreenTree 🌳</h1>

<div id="diamante">
    <div id="menu-content">
        <div id="menu-title">Menu</div>
        <div id="form-aggiungi">
        
        <label>Nome:</label>
        <input type="text" id="nome" placeholder="Inserisci il tuo nome">
        
        <label>Tipologia:</label>
        <input type="text" id="Tipo" placeholder="Inserisci il tipo">
        
        <label>Data Piazzamento:</label>
        <input type="date" id="DataPiazzamento" placeholder="Inserisci la data del piazzamento">
        
        <label>Latitudine:</label>
        <input type="text" id="Latitudine" placeholder="Inserisci la latitudine">
        
        <label>Longitudine:</label>
        <input type="text" id="Longitudine" placeholder="Inserisci la longitudine">
        <label>coordinate:</label>
        <input type="button" id="coordinate" onclick="rilevaEInviaPosizione()" placeholder="Inserisci le coordinate automaticamente">
        
        <button id="submit">Invia</button>
        </div>
    </div>
</div>

<div id="mappa"> 
    <iframe style="width: 100%; height: 100%; border: 0;" allowfullscreen allow="geolocation"
    src="//umap.openstreetmap.fr/it/map/evergreentree_1378856?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=false&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true">
    </iframe>
</div>

<script>
    function rilevaEInviaPosizione() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            console.log("Coordinate rilevate:", lat, lng);
            inviaAlDatabase(lat, lng);
        }, function(error) {
            alert("Errore nel rilevamento della posizione: " + error.message);
        });
    } else {
        alert("Il tuo browser non supporta la geolocalizzazione.");
    }
}
function aggiungiEvento(elemento, tipo, funzione) {
    elemento.addEventListener(tipo, funzione);
}

let aperto = false;
const diamante = document.getElementById("diamante");
const menuContent = document.getElementById("menu-content");
const submitBtn = document.getElementById("submit");

// Clic sul diamante per aprire/chiudere
aggiungiEvento(diamante, "click", function() {
    if (!aperto) {
        diamante.classList.add("menu-aperto");
        diamante.style.transform = "rotate(0deg)";
        diamante.style.width = "25%";
        diamante.style.height = "90%";
        diamante.style.borderRadius = "2%";
        diamante.style.backgroundColor = "#69DB7C";
        aperto = true;
    } else {
        diamante.classList.remove("menu-aperto");
        diamante.style.transform = "rotate(45deg)";
        diamante.style.width = "6.5%";
        diamante.style.height = "12%";
        diamante.style.borderRadius = "0%";
        diamante.style.backgroundColor = "#4CAF50";
        aperto = false;
    }
});

// Ferma la propagazione dei click dentro il menu
aggiungiEvento(menuContent, "click", function(event) {
    event.stopPropagation(); /*serve per selezionare le cose giuste se sono contenute in altri oggetti*/
    /*es gli input che sono contenuti dentro il rombo*/
});

// Pulsante invio
aggiungiEvento(submitBtn, "click", function(event){
    event.stopPropagation();
    alert("ID: " + document.getElementById("id").value +
      /* \n va a capo*/ "\nNome: " + document.getElementById("nome").value + /*concatena stringhe*/
          "\nTipologia: " + document.getElementById("Tipo").value +
          "\nData Piazzamento: " + document.getElementById("DataPiazzamento").value +
          "\nLatitudine: " + document.getElementById("Latitudine").value +
          "\nLongitudine: " + document.getElementById("Longitudine").value);
});
</script>

</body>
</html>
