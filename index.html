<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EverGreenTree</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background-color: #F1F8E9;
    color: #263238;
    font-family: sans-serif;
}

/* Titolo */
#welcome {
    text-align: center;
    margin-top: 20px;
    padding: 0 10px;
}

#diamante {
    width: 60px;
    height: 60px;
    background-color: #4CAF50;
    position: absolute;
    left: 20px;
    top: 20px;
    transform: rotate(45deg);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #F1F8E9;
    font-size: 1.5rem;
    transition: all 0.4s ease;
    overflow: hidden;
    z-index: 1000;
}

#diamante.menu-aperto {
    transform: rotate(0deg);
    width: 300px;
    height: 550px;
    border-radius: 8px;
    background-color: #69DB7C;
    cursor: default;
    padding: 20px;
    box-sizing: border-box;
}

#menu-content {
    display: none;
    flex-direction: column;
    width: 100%;
}

#diamante.menu-aperto #menu-content {
    display: flex;
}

#menu-title {
    font-weight: bold;
    font-size: 1.4em;
    margin-bottom: 15px;
    text-align: center;
    color: #F1F8E9;
}

#menu-content label {
    margin-top: 10px;
    font-size: 0.9em;
}

#menu-content input {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    margin-bottom: 5px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
}

#menu-content button {
    padding: 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 15px;
    width: 100%;
    font-weight: bold;
}

#mappa {
    background-color: antiquewhite;
    width: 60%;
    height: 60%;
    margin: 40px auto;
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Mobile Adjustments */
@media (max-width: 768px) {
    #welcome {
        font-size: 1.5rem;
        margin-top: 80px; /* Space for the diamond button */
    }

    #diamante {
        left: 10px;
        top: 10px;
        width: 50px;
        height: 50px;
    }

    #diamante.menu-aperto {
        width: 90%;
        left: 5%;
        top: 5%;
        height: auto;
        min-height: 80%;
    }

    #mappa {
        width: 90%;
        height: 50%;
        margin: 20px auto;
    }
}
</style>
</head>
<body>

<h1 id="welcome">Welcome to EverGreenTree 🌳</h1>

<div id="diamante">
    <div id="menu-content">
        <div id="menu-title">Aggiungi L'Albero</div>
        <div id="form-aggiungi">
            <label>Nome:</label>
            <input type="text" id="nome" placeholder="Inserisci il tuo nome" required>
            
            <label>Tipologia:</label>
            <input type="text" id="Tipo" placeholder="Inserisci il tipo" required>
            
            <label>Data Piazzamento:</label>
            <input type="date" id="DataPiazzamento" required>

            <label>Latitudine:</label>
            <input type="text" id="Latitudine" placeholder="Inserisci la latitudine">
            
            <label>Longitudine:</label>
            <input type="text" id="Longitudine" placeholder="Inserisci la longitudine">

            <button onclick="rilevaPosizione()">Rileva Coordinate</button>
            
            <button id="submit">Invia</button>
        </div>
    </div>
</div>

<div id="mappa"> 
    <iframe style="width: 100%; height: 100%; border: 0;" allowfullscreen allow="geolocation"
    src="//umap.openstreetmap.fr/it/map/evergreentree_1378856?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=false&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true">
    </iframe>
</div>

<script>
    function rilevaPosizione() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            document.getElementById("Latitudine").value = lat;
            document.getElementById("Longitudine").value = lng;
            console.log("Coordinate rilevate:", lat, lng);
        }, function(error) {
            alert("Errore nel rilevamento della posizione: " + error.message);
        });
    } else {
        alert("Il tuo browser non supporta la geolocalizzazione.");
    }
}
function aggiungiEvento(elemento, tipo, funzione) {
    elemento.addEventListener(tipo, funzione);
}

let aperto = false;
const diamante = document.getElementById("diamante");
const menuContent = document.getElementById("menu-content");
const submitBtn = document.getElementById("submit");

// Clic sul diamante per aprire/chiudere
aggiungiEvento(diamante, "click", function() {
    if (!aperto) {
        diamante.classList.add("menu-aperto");
        aperto = true;
    } else {
        diamante.classList.remove("menu-aperto");
        aperto = false;
    }
});

// Ferma la propagazione dei click dentro il menu
aggiungiEvento(menuContent, "click", function(event) {
    event.stopPropagation();
});

// Pulsante invio
aggiungiEvento(submitBtn, "click", async function(event){
    event.stopPropagation();
    
    const latInput = document.getElementById("Latitudine").value;
    const lngInput = document.getElementById("Longitudine").value;
    console.log("Input LAT/LNG:", latInput, lngInput);
    
    if (!latInput || !lngInput) {
        alert("RILEVA POSIZIONE PRIMA!");
        return;
    }
    
    const formData = new URLSearchParams();  // ← URLSearchParams!
    formData.append('nome', document.getElementById("nome").value);
    formData.append('tipologia', document.getElementById("Tipo").value);
    formData.append('datapiazzamento', document.getElementById("DataPiazzamento").value);
    formData.append('Latitudine', latInput);
    formData.append('Longitudine', lngInput);
    
    console.log("Invio:", Object.fromEntries(formData));
    
    try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbxiypnCuaCcPC2qu7A7__qa563skPa3VoHsOrZRDtwXB67065vGSxRZRhkeVHnrjIZqSw/exec', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},  // ← OBBLIGATORIO
            body: formData
        });
        const result = await response.json();
        console.log("Server:", result);
        
        if (result.result === 'success') {
            alert('Albero salvato riga ' + result.row + '!');
            document.getElementById("nome").value = '';
            document.getElementById("Tipo").value = '';
            document.getElementById("DataPiazzamento").value = '';
            document.getElementById("Latitudine").value = '';
            document.getElementById("Longitudine").value = '';
        } else {
            alert('Errore: ' + result.error);
        }
    } catch(error) {
        console.error(error);
        alert('Errore: ' + error);
    }
});
</script>

</body>
</html>
