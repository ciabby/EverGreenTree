<!DOCTYPE html>
<html>
<head>
<title>EverGreenTree</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    background-color: #F1F8E9;
    color: #263238;
}

/* Titolo */
#welcome {
    position: absolute;
    left: 38%;
}

#diamante {
    width: 6.5%;
    height: 12%;
    background-color: #4CAF50;
    position: absolute;
    left: 2%;
    top: 4%;
    transform: rotate(45deg);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #F1F8E9;
    font-size: x-large;
    transition: all 0.4s ease;
    overflow: hidden;
}

#menu-content {
    display: none;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    width: 90%;
    margin-left: 5%;
}

#diamante.menu-aperto #menu-content {
    display: flex;
}

#menu-title {
    font-weight: bold;
    font-size: 1.2em;
    margin-bottom: 5px;
    text-align: center;
    color: #F1F8E9;
    width: 95%; 
}

#menu-content label {
    margin-top: 5px;
    font-size: 0.9em;
}

#menu-content input {
    width: 100%;
    padding: 5px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

#menu-content button {
    padding: 5px 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
}

#mappa {
    background-color: antiquewhite;
    width: 50%;
    height: 40%;
    position: absolute;
    top: 30%;
    left: 30%;
}
</style>
</head>
<body>

<h1 id="welcome">Welcome to EverGreenTree 🌳</h1>

<div id="diamante">
    <div id="menu-content">
        <div id="menu-title">Menu</div>
        <div id="form-aggiungi">
            <label>Nome:</label>
            <input type="text" id="nome" placeholder="Inserisci il tuo nome" required>
            
            <label>Tipologia:</label>
            <input type="text" id="Tipo" placeholder="Inserisci il tipo" required>
            
            <label>Data Piazzamento:</label>
            <input type="date" id="DataPiazzamento" required>

            <label>Latitudine:</label>
            <input type="text" id="Latitudine" placeholder="Inserisci la latitudine">
            
            <label>Longitudine:</label>
            <input type="text" id="Longitudine" placeholder="Inserisci la longitudine">

            <button onclick="rilevaPosizione()">Rileva Coordinate</button>
            
            <button id="submit">Invia</button>
        </div>
    </div>
</div>

<div id="mappa"> 
    <iframe style="width: 100%; height: 100%; border: 0;" allowfullscreen allow="geolocation"
    src="//umap.openstreetmap.fr/it/map/evergreentree_1378856?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=false&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true">
    </iframe>
</div>

<script>
    function rilevaPosizione() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            document.getElementById("Latitudine").value = lat;
            document.getElementById("Longitudine").value = lng;
            console.log("Coordinate rilevate:", lat, lng);
            inviaAlDatabase(lat, lng);
        }, function(error) {
            alert("Errore nel rilevamento della posizione: " + error.message);
        });
    } else {
        alert("Il tuo browser non supporta la geolocalizzazione.");
    }
}
function aggiungiEvento(elemento, tipo, funzione) {
    elemento.addEventListener(tipo, funzione);
}

let aperto = false;
const diamante = document.getElementById("diamante");
const menuContent = document.getElementById("menu-content");
const submitBtn = document.getElementById("submit");

// Clic sul diamante per aprire/chiudere
aggiungiEvento(diamante, "click", function() {
    if (!aperto) {
        diamante.classList.add("menu-aperto");
        diamante.style.transform = "rotate(0deg)";
        diamante.style.width = "25%";
        diamante.style.height = "90%";
        diamante.style.borderRadius = "2%";
        diamante.style.backgroundColor = "#69DB7C";
        aperto = true;
    } else {
        diamante.classList.remove("menu-aperto");
        diamante.style.transform = "rotate(45deg)";
        diamante.style.width = "6.5%";
        diamante.style.height = "12%";
        diamante.style.borderRadius = "0%";
        diamante.style.backgroundColor = "#4CAF50";
        aperto = false;
    }
});

// Ferma la propagazione dei click dentro il menu
aggiungiEvento(menuContent, "click", function(event) {
    event.stopPropagation();
});

// Pulsante invio
aggiungiEvento(submitBtn, "click", async function(event){
    event.stopPropagation();
    
    const formData = new FormData();
    formData.append('nome', document.getElementById("nome").value);
    formData.append('tipologia', document.getElementById("Tipo").value);
    formData.append('datapiazzamento', document.getElementById("DataPiazzamento").value);
    formData.append('Latitudine',lat);
    formData.append('Longitudine',lng);
    
    try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbyPe3AvjUAYswjvMjbpF_0wGevywnU_kR0liojufq1D_A0fNUuzoTzIMHivEaE-tFNTYw/exec', {
            method: 'POST',
            body: formData
        });
        const result = await response.json();
        
        if (result.result === 'success') {
            alert('Albero' + ' salvato nella riga ' + result.row + '!');
            document.getElementById("nome").value = '';
            document.getElementById("Tipo").value = '';
            document.getElementById("DataPiazzamento").value = '';
            document.getElementById("Latitudine").value = '';
            document.getElementById("Longitudine").value = '';
        } else {
            alert('Errore: ' + result.error);
        }
    } catch(error) {
        alert('Errore connessione: ' + error);
    }
});
</script>

</body>
</html>
