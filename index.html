<!DOCTYPE html>
<html>
<head>
<title>EverGreenTree</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    background-color: #F1F8E9;
    color: #263238;
}

/* Titolo */
#welcome {
    position: absolute;
    left: 38%;
}

/* Linee */
#LinSotto {
    width: 20%;
    height: 1%;
    background-color: #4CAF50;
    position: absolute;
    top: 30%;
    left: 40%;
}

#LinLato {
    width: 1%;
    height: 25%;
    background-color: #4CAF50;
    position: absolute;
    top: 5%;
    left: 30%;
}

/* Diamante / Menu */
#diamante {
    width: 6.5%;      /* larghezza diamante chiuso */
    height: 12%;      /* altezza diamante chiuso */
    background-color: #4CAF50;
    position: absolute;
    left: 2%;
    top: 4%;
    transform: rotate(45deg);
    display: flex;
    justify-content: center;
    align-items: center; /* testo centrato quando chiuso */
    cursor: pointer;
    color: #F1F8E9;
    font-size: x-large;
    transition: all 0.4s ease;
    overflow: hidden;
}

/* Menu aperto: testo in alto */
#diamante.menu-aperto {
    align-items: flex-start;
    padding-top: 1%; /* spazio interno in alto */
}

/* Mappa */
#mappa {
    background-color: antiquewhite;
    width: 50%;
    height: 40%;
    position: absolute;
    top: 30%;
    left: 30%;
}
</style>
</head>

<body>

<h1 id="welcome">Welcome to EverGreenTree 🌳</h1>
<hr id="LinSotto">
<hr id="LinLato">

<div id="diamante" onclick="menu()"></div>

<div id="mappa"> 
    <iframe style="width: 100%; height: 100%; border: 0;" allowfullscreen allow="geolocation"
    src="//umap.openstreetmap.fr/it/map/evergreentree_1378856?...">
    </iframe>
</div>

<script>
let aperto = false;
const d = document.getElementById("diamante");

/* dimensioni chiuso */
const widthClosed = "6.5%";
const heightClosed = "12%";

function menu() {
    if (!aperto) {
        // Menu aperto
        d.classList.add("menu-aperto"); /* aggiungo una classe css all'elemento diamante*/
        d.style.transform = "rotate(0deg)";
        d.style.width = "25%";
        d.style.height = "90%";
        d.textContent = "Menu";
        d.style.borderRadius = "2%";
        d.style.backgroundColor = "#69DB7C";
        aperto = true;
    } 
    else {
        // Diamante chiuso
        d.classList.remove("menu-aperto");
        d.style.transform = "rotate(45deg)";
        d.style.width = widthClosed;
        d.style.height = heightClosed;
        d.textContent = "";
        d.style.borderRadius = "0%";
        d.style.backgroundColor = "#4CAF50";
        aperto = false;
    }
}
</script>

</body>
</html>
